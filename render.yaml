services:
  - type: web
    name: ai-companion
    runtime: python
    plan: free
    buildCommand: pip install -r render-requirements.txt
    startCommand: gunicorn --worker-class gthread --threads 8 --timeout 120 --bind 0.0.0.0:$PORT app:app
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.11